services:
  traefik:
    image: traefik:v3.5
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--entrypoints.web.address=:80"
      - "--accesslog=true"
      - "--accesslog.format=json"
    labels:
      - "traefik.http.routers.dashboard.rule=Host(`${ENV:-stg}-dashboard.datnguyen2409.tech`) && (PathPrefix(`/api`) || PathPrefix(`/dashboard`))"
      - "traefik.http.routers.dashboard.service=api@internal"
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  lab-admin-go:
    image: ${DOCKER_USERNAME:-congdat2409}/lab-admin-go:${DOCKER_TAG:-latest}
    restart: unless-stopped
    environment:
      - SERVER_PORT=9000
    labels:
      - traefik.enable=true
      - traefik.http.routers.lab-admin-go.rule=Host(`${ENV:-stg}-lab.datnguyen2409.tech`)
      - traefik.http.services.lab-admin-go.loadbalancer.server.port=9000
    env_file:
      - ../.env
    ports:
      - "9000:9000"
