services:
  lab-admin-go:
    image: ${DOCKER_USERNAME:-congdat2409}/lab-admin-go:${DOCKER_TAG:-latest}
    restart: unless-stopped
    environment:
      - SERVER_PORT=9000
    labels:
      - traefik.enable=true
      - traefik.http.routers.lab-admin-http.rule=Host(`anhquanlab.datnguyen2409.tech`)
      - traefik.http.routers.lab-admin-http.entryPoints=web
      - traefik.http.routers.lab-admin-https.tls=true
      - traefik.http.routers.lab-admin-https.entryPoints=websecure
      - traefik.http.routers.lab-admin-https.rule=Host(`anhquanlab.datnguyen2409.tech`)
      - traefik.http.routers.lab-admin-https.tls.certresolver=cloudflare
    env_file:
      - ../.env
    ports:
      - "9000:9000"
    networks:
      - lab-admin-network

networks:
  lab-admin-network:
    name: lab-admin-network
    external: true
        

