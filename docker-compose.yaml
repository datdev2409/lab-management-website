services:
  postgres_db:
    image: postgres:16.10-alpine3.21
    restart: always
    environment:
      POSTGRES_USER: labadmin
      POSTGRES_PASSWORD: labadmin123
      POSTGRES_DB: labadmin
    ports:
      - 5432:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U labadmin -d labadmin"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - default

  gotenberg:
    image: gotenberg/gotenberg:8
    ports:
      - "3000:3000"
    networks:
      - default

volumes:
  postgres_data:

networks:
  default:
    driver: bridge
