sonar.organization=datdev2409
sonar.projectKey=datdev2409_lab-management-website

# relative paths to source directories. More details and properties are described
# at https://docs.sonarsource.com/sonarqube-server/latest/project-administration/analysis-scope/ 
sonar.sources=.

# Exclude test files from code coverage and duplication analysis
sonar.coverage.exclusions=**/*_test.go
sonar.cpd.exclusions=**/*_test.go

# Exclude test files from analysis (optional - keeps them visible but marks as test code)
sonar.tests=.
sonar.test.inclusions=**/*_test.go

# Exclude generated files and dependencies
sonar.exclusions=**/vendor/**,**/*_templ.go,**/node_modules/**,**/bin/**,**/reports/**