name: CI Pipeline

on:
  pull_request:
    branches: [main, develop]

jobs:
  build:
    name: Build project
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.23"

      - name: Install dependencies
        run: go mod download

      - name: Install templ
        run: go install github.com/a-h/templ/cmd/templ@latest

      - name: Generate templ files
        run: templ generate

      - name: Build go application
        run: make build

  docker-build-and-push:
    name: Docker Build and Push
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Build Docker image
        run: docker build -t lab-admin-go:${{ github.event.pull_request.head.sha }} --build-arg ENV=local .

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker image
        run: |
          docker tag lab-admin-go:${{ github.event.pull_request.head.sha }} ${{ vars.DOCKER_USERNAME }}/lab-admin-go:${{ github.event.pull_request.head.sha }}
          docker push ${{ vars.DOCKER_USERNAME }}/lab-admin-go:${{ github.event.pull_request.head.sha }}
