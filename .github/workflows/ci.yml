name: CI Pipeline

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

env:
  DOCKER_IMAGE: lab-admin-go
  DOCKER_TAG: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

jobs:
  build:
    name: Build project
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: snyk/actions/setup@master
      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"

      - name: Install dependencies
        run: go mod download

      - name: Install templ
        run: go install github.com/a-h/templ/cmd/templ@latest

      - name: Generate templ files
        run: templ generate

      - name: Build go application
        run: make build

      - name: Run Snyk SCA scan
        run: snyk test --all-projects --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Run Snyk Code SAST scan
        run: snyk code test --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  docker-build-and-push:
    name: Docker Build and Push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Build Docker image
        run: docker build -t $DOCKER_IMAGE:$DOCKER_TAG .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: "${{env.DOCKER_IMAGE}}:${{ env.DOCKER_TAG }}"
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          hide-progress: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker image
        run: |
          docker tag $DOCKER_IMAGE:$DOCKER_TAG ${{ vars.DOCKER_USERNAME }}/$DOCKER_IMAGE:$DOCKER_TAG
          docker push ${{ vars.DOCKER_USERNAME }}/$DOCKER_IMAGE:$DOCKER_TAG

  e2e-tests:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    needs: docker-build-and-push
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chrome

      - name: Set up Docker Compose
        uses: docker/setup-compose-action@v1

      - name: Start dependencies with Docker Compose
        run: docker compose -f docker-compose.ci.yaml up -d

      - name: Start application container
        run: |
          docker run -d --env-file .env.ci --name lab-admin-go --network=host -p 9000:9000 ${{env.DOCKER_IMAGE}}:${{env.DOCKER_TAG}}

      - name: Wait for application to start
        run: |
          for i in {30..0}; do
            if docker exec lab-admin-go curl -s http://localhost:9000/health | grep -q "ok"; then
              exit 0
            fi
            echo "Waiting for application to start..."
            sleep 1
          done
          exit 1

      - name: Run E2E tests
        env:
          CI: true
        run: npm run test:ci

      - name: Cleanup
        if: ${{ always() }}
        run: |
          docker compose -f docker-compose.ci.yaml down
          docker rm -f lab-admin-go

      - name: Upload Playwright Test Report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 3
