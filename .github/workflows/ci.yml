name: CI Pipeline

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

env:
  DOCKER_IMAGE: lab-admin-go
  DOCKER_TAG: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

jobs:
  build:
    name: Build project
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Install dependencies
        run: go mod download

      - name: Install templ
        run: go install github.com/a-h/templ/cmd/templ@latest

      - name: Generate templ files
        run: templ generate

      - name: Build go application
        run: make build

      - name: Run Trivy vulnerability scanner and generate SBOM
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: 1
          severity: 'CRITICAL,HIGH'

  docker-build-and-push:
    name: Docker Build and Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      
      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.0

      - name: Check install!
        run: cosign version

      - name: Build Docker image
        run: docker build -t $DOCKER_IMAGE:$DOCKER_TAG .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: "${{env.DOCKER_IMAGE}}:${{ env.DOCKER_TAG }}"
          format: "github"
          exit-code: "1"
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"
          output: 'dependency-results.sbom.json'
          github-pat: ${{ secrets.REPO_GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker image
        run: |
          docker tag $DOCKER_IMAGE:$DOCKER_TAG ${{ vars.DOCKER_USERNAME }}/$DOCKER_IMAGE:$DOCKER_TAG
          docker push ${{ vars.DOCKER_USERNAME }}/$DOCKER_IMAGE:$DOCKER_TAG
      
      - name: Generate CycloneDX SBOM
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: "${{ vars.DOCKER_USERNAME }}/${{env.DOCKER_IMAGE}}:${{ env.DOCKER_TAG }}"
          format: 'cyclonedx'
          output: 'sbom.json'
      
      - name: Attest SBOM
        run: |
          cosign attest --yes \
            --type cyclonedx \
            --predicate sbom.json \
            ${{ vars.DOCKER_USERNAME }}/${{env.DOCKER_IMAGE}}:${{env.DOCKER_TAG}}

  e2e-tests:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    needs: docker-build-and-push
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: lts/*
      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.0
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install chromium

      - name: Set up Docker Compose
        uses: docker/setup-compose-action@v1

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Start dependencies with Docker Compose
        run: docker compose -f docker-compose.ci.yaml up -d

      - name: Start application container
        run: |
          docker run -d --env-file .env.ci --name lab-admin-go --network=host -p 9000:9000 ${{ vars.DOCKER_USERNAME }}/${{env.DOCKER_IMAGE}}:${{env.DOCKER_TAG}}

      - name: Wait for application to start
        run: |
          for i in {30..0}; do
            status_code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:9000/health || echo "000")
            if [[ $status_code -eq 200 ]]; then
              exit 0
            fi
            echo "Waiting for application to start..."
            sleep 1
          done
          exit 1

      - name: Run seed data script
        run: |
          chmod +x ./scripts/seed-test-data.sh
          ./scripts/seed-test-data.sh

      - name: Run E2E tests
        env:
          CI: true
        run: npm run test:ci
      
      - name: Create Build Metadata
        if: success()
        run: |
          echo '{
            "builder": "${{ github.actor }}",
            "build_at": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'",
            "e2e_test": "passed",
            "commit": "${{ github.sha }}"
          }' > build-metadata.json

      - name: Attest Build Metadata
        if: success()
        run: |
          cosign attest --yes \
            --type custom \
            --predicate build-metadata.json \
            ${{ vars.DOCKER_USERNAME }}/${{env.DOCKER_IMAGE}}:${{env.DOCKER_TAG}}

      - name: Cleanup
        if: ${{ always() }}
        run: |
          docker compose -f docker-compose.ci.yaml down
          docker rm -f lab-admin-go

      - name: Upload Playwright Test Report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 3

