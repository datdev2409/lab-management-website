name: CI Pipeline

on:
  pull_request:
    branches: [main, develop]

jobs:
  build:
    name: Build project
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.23"

      - name: Install dependencies
        run: go mod download

      - name: Install templ
        run: go install github.com/a-h/templ/cmd/templ@latest

      - name: Generate templ files
        run: templ generate

      - name: Build go application
        run: make build

  containerize:
    name: Containerize application
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Build Docker image
        run: docker build -t lab-admin-go:${GITHUB_SHA} -e GO_ENV=local .

      - name: Run Docker container
        run: docker run -d -p 8080:8080 --name lab-admin lab-admin-go:${GITHUB_SHA}

      - name: Test application endpoint
        run: |
          sleep 5
          curl -f http://localhost:8080/health

      - name: Stop Docker container
        run: docker stop lab-admin && docker rm lab-admin
