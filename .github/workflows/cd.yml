name: CD Pipeline

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy. This can be a commit SHA, or tag."
        required: true
        type: string
      environment:
        description: "Environment to deploy to"
        required: true
        type: choice
        options:
          - stg
          - prod
        default: stg

env:
  DOCKER_IMAGE: lab-admin-go

jobs:
  deploy:
    name: Deploy Application
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Show deployment info
        run: |
          echo "🚀 Starting deployment..."
          echo "Repository: ${{ github.repository }}"
          echo "Source Code SHA: ${{ github.sha }}"
          echo "Environment: ${{ inputs.environment }}"
          echo "Image Tag: ${{ inputs.image_tag }}"

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ vars.SSH_HOST }}
          username: ${{ vars.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -e

            REPO_OWNER=${{ github.event.repository.owner.login }}
            REPO_NAME=${{ github.event.repository.name }}

            GITHUB_URL="https://github.com/$REPO_OWNER/$REPO_NAME.git"
            echo $GITHUB_URL

            rm -rf $REPO_NAME
            git clone $GITHUB_URL
            cd $REPO_NAME
            git checkout ${{ github.sha }}
            pwd

            export DOCKER_TAG=${{ inputs.image_tag }}
            export ENV=${{ inputs.environment }}
            export DOCKER_USERNAME=${{ vars.DOCKER_USERNAME }}

            make stop-app
            make start-app

            echo "Deployment completed successfully!"

            # Verify deployment
            sleep 10
            if docker ps | grep -q "${{ env.DOCKER_IMAGE }}"; then
              echo "✅ Application is running successfully"
            else
              echo "❌ Application failed to start"
              exit 1
            fi

            # Health check
            for i in {1..10}; do
            if [ $(curl -s -o /dev/null -w "%{http_code}" localhost:9000/health) -eq 200 ]; then
              echo "Health check passed!"
              break
            else
              echo "Health check failed, retrying in 5 seconds... ($i/10)"
              sleep 5
            fi
            if [ $i -eq 10 ]; then
              echo "Health check failed after 10 attempts."
              exit 1
            fi
            done

      - name: Notify deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "🚀 Deployment SUCCESS: Tag ${{ inputs.image_tag }} deployed to ${{ inputs.environment }}"
          else
            echo "💥 Deployment FAILED: Tag ${{ inputs.image_tag }} failed to deploy to ${{ inputs.environment }}"
          fi
