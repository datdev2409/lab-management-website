name: Backup MongoDB to S3

on:
  # Manual trigger
  workflow_dispatch:
    inputs:
      environment:
        description: "Select environment to run the backup"
        required: true
        type: choice
        options:
          - stg
          - prod
        default: stg

  # Scheduled trigger - runs daily at 3:00 AM VNT (8:00 PM UTC)
  schedule:
    - cron: "0 20 * * *"

env:
  BACKUP_BUCKET: "anhquanlab-db-backup-bucket"
  MONGO_URI: ${{ secrets.MONGODB_URI }}
  BACKUP_DIR: /tmp/mongo-backup
  AWS_REGION: ${{ vars.AWS_REGION }}
  ENVIRONMENT: ${{ inputs.environment || 'stg' }}

jobs:
  backup-mongodb:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'stg' }}

    steps:
      - uses: "actions/checkout@v4"

      - uses: "google-github-actions/auth@v3"
        with:
          project_id: "anhquanlab"
          workload_identity_provider: "projects/622833532858/locations/global/workloadIdentityPools/github-action-pool/providers/datdev2409-github-repos"

      - name: Install MongoDB Database Tools
        run: |
          # Download and install MongoDB Database Tools
          wget https://fastdl.mongodb.org/tools/db/mongodb-database-tools-ubuntu2404-x86_64-100.13.0.deb
          chmod o+r ./mongodb-database-tools-ubuntu2404-x86_64-100.13.0.deb
          sudo apt install ./mongodb-database-tools-ubuntu2404-x86_64-100.13.0.deb

          # Verify installation
          mongodump --version
          echo "MongoDB Database Tools installed successfully"

      - name: Create backup directory
        run: |
          mkdir -p ${{ env.BACKUP_DIR }}
          echo "Created backup directory: ${{ env.BACKUP_DIR }}"

      - name: Generate backup metadata
        id: backup-metadata
        run: |
          set -euo pipefail

          TIMESTAMP=$(date +'%Y%m%d_%H%M%S')
          BACKUP_NAME="${TIMESTAMP}"
          BACKUP_PATH="${{ env.BACKUP_DIR }}/${BACKUP_NAME}"
          BACKUP_FILE="${BACKUP_NAME}.tar.gz"
          OBJECT_KEY="${{ env.ENVIRONMENT }}/${BACKUP_FILE}"

          echo "Generated backup metadata:"
          echo "Timestamp: ${TIMESTAMP}"
          echo "Backup name: ${BACKUP_NAME}"
          echo "Backup path: ${BACKUP_PATH}"
          echo "Backup file: ${BACKUP_FILE}"
          echo "Object key: ${OBJECT_KEY}"

          # Set outputs for subsequent steps
          echo "timestamp=${TIMESTAMP}" >> $GITHUB_OUTPUT
          echo "backup-name=${BACKUP_NAME}" >> $GITHUB_OUTPUT
          echo "backup-path=${BACKUP_PATH}" >> $GITHUB_OUTPUT
          echo "backup-file=${BACKUP_FILE}" >> $GITHUB_OUTPUT
          echo "object-key=${OBJECT_KEY}" >> $GITHUB_OUTPUT

      - name: Create MongoDB backup
        run: |
          set -euo pipefail

          BACKUP_PATH="${{ steps.backup-metadata.outputs.backup-path }}"

          echo "Starting MongoDB backup..."
          echo "Backup path: ${BACKUP_PATH}"

          # Create mongodump backup
          mongodump --uri="${{ env.MONGO_URI }}" --out="${BACKUP_PATH}"

          echo "MongoDB backup completed successfully"

      - name: Compress backup
        run: |
          set -euo pipefail

          BACKUP_NAME="${{ steps.backup-metadata.outputs.backup-name }}"
          BACKUP_FILE="${{ steps.backup-metadata.outputs.backup-file }}"

          echo "Compressing backup..."

          # Create compressed archive
          cd ${{ env.BACKUP_DIR }}
          tar -czf "${BACKUP_FILE}" "${BACKUP_NAME}"

          echo "Backup compression completed"
          echo "Backup size: $(du -sh ${BACKUP_FILE} | cut -f1)"

      - name: Upload backup to Google Cloud Storage
        run: |
          set -euo pipefail

          BACKUP_FILE="${{ steps.backup-metadata.outputs.backup-file }}"
          OBJECT_KEY="${{ steps.backup-metadata.outputs.object-key }}"
          GCS_URI="gs://${{ env.BACKUP_BUCKET }}/${OBJECT_KEY}"

          echo "Uploading backup to Google Cloud Storage..."
          echo "Source: ${{ env.BACKUP_DIR }}/${BACKUP_FILE}"
          echo "Destination: ${GCS_URI}"

          # Upload to Google Cloud Storage
          gcloud storage cp "${{ env.BACKUP_DIR }}/${BACKUP_FILE}" "${GCS_URI}"

          echo "Backup uploaded successfully to Google Cloud Storage"

      - name: Verify backup integrity
        run: |
          set -euo pipefail

          BACKUP_FILE="${{ steps.backup-metadata.outputs.backup-file }}"
          OBJECT_KEY="${{ steps.backup-metadata.outputs.object-key }}"
          echo "Verifying backup integrity..."

          GCS_SIZE=$(gcloud storage objects describe "gs://${{ env.BACKUP_BUCKET }}/${OBJECT_KEY}" --format="value(size)")

          LOCAL_SIZE=$(stat -c%s "${{ env.BACKUP_DIR }}/${BACKUP_FILE}")

          echo "Local backup size: ${LOCAL_SIZE} bytes"
          echo "GCS backup size: ${GCS_SIZE} bytes"

          if [[ "$LOCAL_SIZE" == "$GCS_SIZE" ]]; then
            echo "✅ Backup integrity verified - sizes match"
          else
            echo "❌ Backup integrity check failed - size mismatch"
            exit 1
          fi

      - name: Send success notification
        run: |
          set -euo pipefail

          BACKUP_FILE="${{ steps.backup-metadata.outputs.backup-file }}"
          OBJECT_KEY="${{ steps.backup-metadata.outputs.object-key }}"
          COMPLETION_TIME=$(date -u '+%Y-%m-%d %H:%M:%S UTC')

          echo "✅ MongoDB backup completed successfully at ${COMPLETION_TIME}"
          echo "Backup file: ${BACKUP_FILE}"
          echo "GCS location: gs://${{ env.BACKUP_BUCKET }}/${OBJECT_KEY}"
          echo "Environment: ${{ env.ENVIRONMENT }}"

      - name: Send failure notification
        if: failure()
        run: |
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
          echo "❌ MongoDB backup failed at ${TIMESTAMP}"
          echo "Please check the workflow logs for details"
          echo "Repository: ${{ github.repository }}"
          echo "Run ID: ${{ github.run_id }}"
          echo "Run URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Cleanup local files
        if: always()
        run: |
          echo "Cleaning up local backup files..."
          rm -rf ${{ env.BACKUP_DIR }}
          echo "Local cleanup completed"
