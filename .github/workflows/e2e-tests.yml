name: E2E Tests

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  e2e-tests:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Go dependencies
        run: go mod download

      - name: Install templ
        run: go install github.com/a-h/templ/cmd/templ@latest

      - name: Generate templ files
        run: templ generate

      - name: Build application
        run: go build -o bin/server cmd/api/main.go

      - name: Start MongoDB and services
        run: docker-compose -f docker-compose.test.yml up -d

      - name: Wait for MongoDB to be ready
        run: |
          echo "Waiting for MongoDB..."
          CONTAINER_ID=$(docker ps -qf "name=mongo_db")
          timeout 60 bash -c \
            'until docker exec '"$CONTAINER_ID"' mongosh \
            --eval "db.adminCommand(\"ping\")" > /dev/null 2>&1; \
            do sleep 2; done'
          echo "MongoDB is ready!"

      - name: Seed test data
        run: |
          chmod +x tests/scripts/seed-test-data.sh
          MONGODB_URI="mongodb://root:password123@localhost:27017" \
            tests/scripts/seed-test-data.sh

      - name: Start application server
        env:
          MONGODB_URI: >-
            mongodb://root:password123@localhost:27017/labadmin?authSource=admin
          SERVER_PORT: "7331"
          ENV: "test"
        run: |
          ./bin/server &
          SERVER_PID=$!
          echo "SERVER_PID=$SERVER_PID" >> $GITHUB_ENV

          # Wait for server to be ready
          echo "Waiting for server to start..."
          timeout 30 bash -c \
            'until curl -f http://localhost:7331/health > /dev/null 2>&1; \
            do sleep 1; done' || \
            echo "Server health check timed out, continuing anyway..."
          echo "Server is ready!"

      - name: Install Playwright dependencies
        working-directory: tests
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: tests
        env:
          CI: true
        run: npm test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/playwright-report/
          retention-days: 7

      - name: Upload test screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots
          path: tests/test-results/
          retention-days: 7

      - name: Stop application server
        if: always()
        run: |
          if [ ! -z "$SERVER_PID" ]; then
            kill $SERVER_PID || true
          fi

      - name: Stop Docker services
        if: always()
        run: docker-compose -f docker-compose.test.yml down -v
